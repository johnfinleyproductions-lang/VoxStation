<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoxStation TTS</title>
<style>
  :root {
    --bg: #0c0c0e;
    --surface: #141417;
    --surface2: #1c1c21;
    --border: #2a2a30;
    --accent: #7c6af7;
    --accent-dim: rgba(124,106,247,0.15);
    --text: #e8e8f0;
    --muted: #6b6b7e;
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.3px;
  }

  .logo-icon { font-size: 18px; }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.ok   { background: var(--success); }
  .dot.fail { background: var(--danger); }

  /* ── Main ───────────────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
    gap: 20px;
  }

  /* ── Voice selector ─────────────────────────────── */
  .voice-bar {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .voice-bar label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    white-space: nowrap;
  }

  select {
    flex: 1;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 14px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus { border-color: var(--accent); }

  /* ── Textarea ───────────────────────────────────── */
  .text-wrap {
    width: 100%;
    position: relative;
  }

  textarea {
    width: 100%;
    min-height: 180px;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 16px;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }

  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: var(--accent); }

  .char-count {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-size: 11px;
    color: var(--muted);
    pointer-events: none;
  }

  /* ── Controls ───────────────────────────────────── */
  .controls {
    width: 100%;
    display: flex;
    gap: 10px;
  }

  button {
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    border: none;
    border-radius: 10px;
    padding: 11px 22px;
    transition: all 0.15s;
    font-family: inherit;
  }

  #speak-btn {
    flex: 1;
    background: var(--accent);
    color: #fff;
  }
  #speak-btn:hover:not(:disabled) { filter: brightness(1.12); transform: translateY(-1px); }
  #speak-btn:disabled { opacity: 0.45; cursor: default; transform: none; }

  #stop-btn {
    background: var(--surface2);
    color: var(--danger);
    border: 1px solid var(--border);
    min-width: 100px;
  }
  #stop-btn:hover:not(:disabled) { background: rgba(248,113,113,0.1); }
  #stop-btn:disabled { opacity: 0.35; cursor: default; }

  /* ── Progress / Status ──────────────────────────── */
  #progress {
    width: 100%;
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    color: var(--muted);
    display: none;
  }
  #progress.visible { display: flex; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Sentence progress bar ──────────────────────── */
  .progress-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }
  .progress-bar-wrap.visible { display: block; }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ── Hint ───────────────────────────────────────── */
  .hint {
    width: 100%;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }
  .hint kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
    font-family: inherit;
  }

  /* ── Responsive ─────────────────────────────────── */
  @media (max-width: 480px) {
    main { padding: 24px 16px; }
    textarea { font-size: 15px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">⚡</span>
    VoxStation TTS
  </div>
  <div class="status-row">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Connecting...</span>
  </div>
</header>

<main>
  <div class="voice-bar">
    <label for="voice-select">Voice</label>
    <select id="voice-select">
      <option value="">Loading voices...</option>
    </select>
  </div>

  <div class="text-wrap">
    <textarea
      id="text-input"
      placeholder="Type or paste anything here and click Speak — your cloned voice will read it back..."
      autofocus
    ></textarea>
    <span class="char-count" id="char-count">0</span>
  </div>

  <div class="controls">
    <button id="speak-btn" onclick="startSpeaking()">▶&nbsp; Speak</button>
    <button id="stop-btn" onclick="stopSpeaking()" disabled>■&nbsp; Stop</button>
  </div>

  <div id="progress">
    <div class="spinner"></div>
    <span id="progress-text">Preparing...</span>
  </div>

  <div class="progress-bar-wrap" id="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>

  <p class="hint">
    Press <kbd>⌘ Enter</kbd> or <kbd>Ctrl Enter</kbd> to speak &nbsp;·&nbsp;
    Bookmark this page for quick access
  </p>
</main>

<script>
// ─────────────────────────────────────────────────────────
// Config — update if your Framestation IP changes
// ─────────────────────────────────────────────────────────
const BASE = window.location.origin; // same origin = no CORS issues

// ─────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────
let audioCtx = null;
let stopped = false;
let speaking = false;
let nextStartTime = 0;

// ─────────────────────────────────────────────────────────
// DOM refs
// ─────────────────────────────────────────────────────────
const $text    = document.getElementById('text-input');
const $voice   = document.getElementById('voice-select');
const $speak   = document.getElementById('speak-btn');
const $stop    = document.getElementById('stop-btn');
const $prog    = document.getElementById('progress');
const $progTxt = document.getElementById('progress-text');
const $bar     = document.getElementById('progress-bar');
const $barWrap = document.getElementById('progress-bar-wrap');
const $charCnt = document.getElementById('char-count');
const $dot     = document.getElementById('status-dot');
const $status  = document.getElementById('status-text');

// ─────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  await loadVoices();
  $text.addEventListener('input', () => {
    $charCnt.textContent = $text.value.length;
  });
  $text.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      if (!speaking) startSpeaking();
    }
    if (e.key === 'Escape') stopSpeaking();
  });
});

// ─────────────────────────────────────────────────────────
// Load voices from voice service
// ─────────────────────────────────────────────────────────
async function loadVoices() {
  try {
    const res = await fetch(`${BASE}/api/voice/voices`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const voices = data.voices || [];

    $dot.className = 'dot ok';
    $status.textContent = `Voice service online · ${voices.length} voice${voices.length !== 1 ? 's' : ''}`;

    $voice.innerHTML = '';
    if (voices.length === 0) {
      $voice.innerHTML = '<option value="">No voices — clone one first</option>';
      $speak.disabled = true;
      return;
    }
    voices.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = `${v.name} (${v.sample_count} sample${v.sample_count !== 1 ? 's' : ''})`;
      $voice.appendChild(opt);
    });
    $speak.disabled = false;

  } catch {
    $dot.className = 'dot fail';
    $status.textContent = 'Voice service offline';
    $voice.innerHTML = '<option value="">Service unavailable</option>';
    $speak.disabled = true;
  }
}

// ─────────────────────────────────────────────────────────
// Split text into sentences
// ─────────────────────────────────────────────────────────
function splitSentences(text) {
  // Split on sentence-ending punctuation
  const raw = text.match(/[^.!?\n]+[.!?\n]+|[^.!?\n]+$/g) || [text];
  const result = [];
  let current = '';

  for (const s of raw) {
    const trimmed = s.trim();
    if (!trimmed) continue;
    // Merge very short fragments (< 15 chars) with next sentence
    if (current.length + trimmed.length < 150) {
      current += (current ? ' ' : '') + trimmed;
    } else {
      if (current) result.push(current);
      current = trimmed;
    }
  }
  if (current) result.push(current);
  return result.filter(s => s.trim().length > 0);
}

// ─────────────────────────────────────────────────────────
// Main speak function
// ─────────────────────────────────────────────────────────
async function startSpeaking() {
  const text = $text.value.trim();
  const voiceId = $voice.value;

  if (!text || !voiceId || speaking) return;

  const sentences = splitSentences(text);
  if (sentences.length === 0) return;

  // Create AudioContext SYNCHRONOUSLY in the click handler
  // — required by browser autoplay policy
  audioCtx = new AudioContext();
  nextStartTime = audioCtx.currentTime;
  stopped = false;
  speaking = true;

  // Update UI
  $speak.disabled = true;
  $stop.disabled = false;
  $prog.classList.add('visible');
  $barWrap.classList.add('visible');
  $bar.style.width = '0%';

  // Process sentences sequentially: fetch next while current plays
  for (let i = 0; i < sentences.length; i++) {
    if (stopped) break;

    const sentence = sentences[i];
    const pct = Math.round(((i + 1) / sentences.length) * 100);
    setProgress(`Speaking sentence ${i + 1} of ${sentences.length}...`, pct);

    try {
      const audioBuffer = await fetchSentence(sentence, voiceId);
      if (stopped || !audioBuffer) break;

      scheduleSentence(audioBuffer);

      // Wait until ~0.4s before this sentence ends to start fetching next
      // This gives a seamless streaming feel
      const waitUntil = (nextStartTime - 0.4 - audioCtx.currentTime) * 1000;
      if (waitUntil > 50) await sleep(waitUntil);

    } catch (err) {
      console.warn('[TTS] Sentence failed:', sentence, err);
      // Continue with next sentence rather than stopping entirely
    }
  }

  // Wait for last sentence to finish playing
  if (!stopped && audioCtx) {
    const remaining = (nextStartTime - audioCtx.currentTime) * 1000;
    if (remaining > 0) {
      setProgress('Playing...', 100);
      await sleep(remaining + 200);
    }
  }

  resetUI();
}

// ─────────────────────────────────────────────────────────
// Fetch a single sentence from the TTS API
// ─────────────────────────────────────────────────────────
async function fetchSentence(text, voiceId) {
  const res = await fetch(`${BASE}/api/voice/synthesize`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, voice_id: voiceId }),
  });

  if (!res.ok) {
    const err = await res.text();
    console.error('[TTS] Synthesis failed:', err);
    return null;
  }

  const arrayBuffer = await res.arrayBuffer();
  return await audioCtx.decodeAudioData(arrayBuffer);
}

// ─────────────────────────────────────────────────────────
// Schedule an audio buffer to play right after the last one
// ─────────────────────────────────────────────────────────
function scheduleSentence(audioBuffer) {
  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);

  const startTime = Math.max(nextStartTime, audioCtx.currentTime + 0.03);
  source.start(startTime);
  nextStartTime = startTime + audioBuffer.duration;
}

// ─────────────────────────────────────────────────────────
// Stop
// ─────────────────────────────────────────────────────────
function stopSpeaking() {
  stopped = true;
  try { audioCtx && audioCtx.close(); } catch {}
  audioCtx = null;
  resetUI();
}

function resetUI() {
  speaking = false;
  $speak.disabled = $voice.value === '';
  $stop.disabled = true;
  $prog.classList.remove('visible');
  $barWrap.classList.remove('visible');
}

function setProgress(text, pct) {
  $progTxt.textContent = text;
  $bar.style.width = pct + '%';
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, Math.max(0, ms)));
}
</script>

</body>
</html>
