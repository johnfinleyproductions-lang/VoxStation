services:
  voxstation-voice:
    build: .
    container_name: voxstation_voice
    ports:
      - "8020:8020"
    volumes:
      - ./models:/app/models
      - ./voices:/app/voices
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - VOXSTATION_WHISPER_MODEL=large-v3
      - VOXSTATION_WHISPER_DEVICE=cuda
      # PyTorch nightly cu128 doesn't have Blackwell sm_120 kernels yet
      # faster-whisper (CTranslate2) works on CUDA, but Chatterbox (PyTorch) must use CPU
      - VOXSTATION_XTTS_DEVICE=cpu
    restart: "no"
