services:
  voxstation-voice:
    build: .
    container_name: voxstation_voice
    ports:
      - "8020:8020"
    volumes:
      - ./models:/app/models
      - ./voices:/app/voices
    # GPU passthrough REMOVED — Blackwell sm_120 crashes both PyTorch and CTranslate2
    # Re-enable once CUDA support stabilizes for sm_120
    environment:
      # Use base model on CPU (large-v3 would be too slow without GPU)
      - VOXSTATION_WHISPER_MODEL=base
      - VOXSTATION_WHISPER_DEVICE=cpu
      - VOXSTATION_XTTS_DEVICE=cpu
      # Hide GPU from all CUDA libraries to prevent crash on init
      - CUDA_VISIBLE_DEVICES=
    restart: "no"
